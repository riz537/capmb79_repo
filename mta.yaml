_schema-version: 3.3.0
ID: b79capmapp
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: b79capmapp-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: b79capmapp-auth
      - name: b79capmapp-db
      - name: b79capmapp-destination

  - name: b79capmapp-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: b79capmapp-db

  - name: b79capmapp-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: b79capmapp-auth
      - name: srv-api
      - name: b79capmapp-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: b79capmappordermgmt
          artifacts:
            - ordermgmt.zip
          target-path: app/
        - name: b79capmappproductsmgmt
          artifacts:
            - productsmgmt.zip
          target-path: app/
        - name: b79capmappstoreanalytics
          artifacts:
            - storeanalytics.zip
          target-path: app/

  - name: b79capmappordermgmt
    type: html5
    path: app/ordermgmt
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: b79capmappproductsmgmt
    type: html5
    path: app/productsmgmt
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: b79capmappstoreanalytics
    type: html5
    path: app/storeanalytics
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: b79capmapp-destinations
    type: com.sap.application.content
    requires:
      - name: b79capmapp-auth
        parameters:
          service-key:
            name: b79capmapp-auth-key
      - name: b79capmapp-html5-repo-host
        parameters:
          service-key:
            name: b79capmapp-html5-repo-host-key
      - name: srv-api
      - name: b79capmapp-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: b79capmapp-html5-repository
              ServiceInstanceName: b79capmapp-html5-repo-host
              ServiceKeyName: b79capmapp-html5-repo-host-key
              sap.cloud.service: b79capmapp.service
            - Name: b79capmapp-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: b79capmapp-auth
              ServiceKeyName: b79capmapp-auth-key
              sap.cloud.service: b79capmapp.service

resources:
  - name: b79capmapp-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: b79capmapp-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'Owner (b79capmapp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Owner'
          - name: 'Employee (b79capmapp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Employee'
          - name: 'userattributes (b79capmapp ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.userattributes'
  - name: b79capmapp-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: b79capmapp-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api

  - name: b79capmapp-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
